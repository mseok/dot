model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
plan_mode_reasoning_effort = "xhigh"
service_tier = "fast"
model_context_window=1000000
model_auto_compact_token_limit=900000

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.obsidian]
command = "/bin/bash"
args = ["-lc", "exec \"$HOME/dot/bin/codex-obsidian-mcp\""]
startup_timeout_sec = 20

[mcp_servers.notebooklm]
command = "npx"
args = ["notebooklm-mcp@latest"]

[shell_environment_policy]
inherit = "core"
set = { MY_FLAG = "1" }
ignore_default_excludes = false
exclude = ["AWS_*", "AZURE_*", "*_KEY"]

[features]
unified_exec = true
shell_snapshot = true
multi_agent = true
apps = false
prevent_idle_sleep = true

[tui]
status_line = ["model-with-reasoning", "project-root", "git-branch", "context-used", "used-tokens", "context-window-size"]
animations = false
show_tooltips = true
notifications = true
notification_method = "bel"
theme = "catppuccin-frappe"
